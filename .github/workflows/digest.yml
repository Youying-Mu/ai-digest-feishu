name: AI Digest

on:
  schedule:
    - cron: "0 0 * * *"  # UTC 0:00 = 北京时间 8:00
  workflow_dispatch:  # 允许手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制使用 Node.js 24

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # 更新到 v4 版本
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # 指定 Node.js 版本
      - run: npm install
      - run: node index.js
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          QWEN_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
