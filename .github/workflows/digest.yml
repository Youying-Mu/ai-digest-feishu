name: AI Digest

on:
  schedule:
    - cron: '55 9 * * *'  # 北京时间 17:55
  workflow_dispatch:

# 👇 关键：在顶层设置环境变量
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制使用 Node.js 24
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false  # 禁用不安全的 Node 版本

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'  # 确保使用 Node.js 24
          cache: 'npm'  # 启用 npm 缓存，加速构建
      - run: npm install
      - run: node index.js
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
