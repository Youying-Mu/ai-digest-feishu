# ai-digest-feishu/.github/workflows/digest.yml
name: AI Digest

on:
  schedule:
    - cron: '30 8 * * *'  # UTC 8:30 = 北京时间 16:30
  workflow_dispatch:

# 👇 关键：在顶层设置环境变量
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制使用 Node.js 24
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: false  # 禁用不安全的 Node 版本

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Clean cache (ensure fresh start daily)
        run: |
          rm -f cache.json || echo "cache.json not found"
          echo "Cache cleared for fresh run"
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'  # 确保使用 Node.js 24
          cache: 'npm'  # 启用 npm 缓存，加速构建
      - run: npm install
      - run: node index.js
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
